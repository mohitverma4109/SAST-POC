name: Node.js Build + SonarQube SAST Scan

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout source code
        uses: actions/checkout@v4

      # ✅ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ✅ Install dependencies
      - name: Install dependencies
        run: npm install

      # ✅ SonarQube Scan
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=SAST-Project1
            -Dsonar.projectName=SAST-Project1
            -Dsonar.sources=.
            -Dsonar.sourceEncoding=UTF-8

      # ✅ Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ✅ Fetch Quality Gate + Fail Pipeline
      - name: Get SonarQube Quality Gate Details
        run: |
          echo "Fetching Quality Gate details..."

          # Check report file
          if [ ! -f ".scannerwork/report-task.txt" ]; then
            echo "❌ report-task.txt not found. Sonar scan failed."
            exit 1
          fi

          # Extract Task URL
          TASK_URL=$(grep ceTaskUrl .scannerwork/report-task.txt | cut -d '=' -f2-)
          echo "Task URL: $TASK_URL"

          if [[ -z "$TASK_URL" ]]; then
            echo "❌ Failed to extract TASK_URL"
            exit 1
          fi

          # Poll for completion
          STATUS="PENDING"
          while [[ "$STATUS" == "PENDING" || "$STATUS" == "IN_PROGRESS" ]]; do
            RESPONSE=$(curl -s -u $SONAR_TOKEN: "$TASK_URL")

            # Validate JSON
            if ! echo "$RESPONSE" | jq . >/dev/null 2>&1; then
              echo "❌ Invalid JSON response:"
              echo "$RESPONSE"
              exit 1
            fi

            STATUS=$(echo "$RESPONSE" | jq -r '.task.status')
            echo "Current Status: $STATUS"

            sleep 5
          done

          if [[ "$STATUS" != "SUCCESS" ]]; then
            echo "❌ SonarQube analysis failed: $STATUS"
            exit 1
          fi

          # Extract Analysis ID
          ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.task.analysisId')

          if [[ -z "$ANALYSIS_ID" || "$ANALYSIS_ID" == "null" ]]; then
            echo "❌ analysisId is null"
            exit 1
          fi

          echo "Analysis ID: $ANALYSIS_ID"

          # Get Quality Gate
          QG_RESPONSE=$(curl -s -u $SONAR_TOKEN: "$SONAR_HOST_URL/api/qualitygates/project_status?analysisId=$ANALYSIS_ID")

          # Validate JSON
          if ! echo "$QG_RESPONSE" | jq . >/dev/null 2>&1; then
            echo "❌ Invalid Quality Gate response:"
            echo "$QG_RESPONSE"
            exit 1
          fi

          echo "===== QUALITY GATE RESULT ====="
          echo "$QG_RESPONSE" | jq .

          # Extract Status
          QG_STATUS=$(echo "$QG_RESPONSE" | jq -r '.projectStatus.status')

          echo "Quality Gate Status: $QG_STATUS"

          echo "----- FAILED CONDITIONS -----"
          echo "$QG_RESPONSE" | jq -r '
            .projectStatus.conditions[]?
            | select(.status=="ERROR")
            | "\(.metricKey): \(.actualValue) (Expected: \(.errorThreshold))"
          '

          # Fail pipeline if not OK
          if [[ "$QG_STATUS" != "OK" ]]; then
            echo "❌ Quality Gate FAILED"
            exit 1
          else
            echo "✅ Quality Gate PASSED"
          fi

        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
