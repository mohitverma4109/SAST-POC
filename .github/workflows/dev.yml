name: Node.js Build + AccuKnox SAST Scan

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  sast:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout source code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # (Optional) Build project
      # Uncomment if your project requires a build before scanning.
      # - name: Build Project
      #   run: npm run build

      # Run AccuKnox SAST
      - name: Run AccuKnox SAST
        uses: accuknox/sast-scan-action@latest
        with:
          # Set to false so the action performs the SonarQube scan
          skip_sonar_scan: false

          # SonarQube Configuration
          sonar_project_key: SAST-Project1
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          sonar_host_url: ${{ secrets.SONAR_HOST_URL }}

          # AccuKnox Configuration
          accuknox_endpoint: ${{ secrets.ACCUKNOX_ENDPOINT }}
          accuknox_token: ${{ secrets.ACCUKNOX_TOKEN }}
          accuknox_label: ${{ secrets.ACCUKNOX_LABEL }}

          # Fail workflow if scan or quality gate fails
          soft_fail: false
