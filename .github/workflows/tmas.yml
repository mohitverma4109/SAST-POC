name: TMAS Scan

on:
  push:
    branches:
      - ".github/workflows/tmas.yml"
      - "**/*.java"
      - "**/*.js"

jobs:
  tmas-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # Checkout source code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install Dependencies
      - name: Install Dependencies
        run: npm install

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t vuln-image:latest .

      # Verify Docker Image
      - name: Verify Docker Image
        run: |
          docker images
          docker inspect vuln-image:latest

      # Download TMAS CLI
      - name: Install TMAS CLI
        run: |
          curl -L https://ast-cli.xdr.trendmicro.com/tmas-cli/2.263.0/tmas-cli_Linux_x86_64.tar.gz -o tmas.tar.gz
          tar -xzf tmas.tar.gz
          chmod +x tmas
          sudo mv tmas /usr/local/bin/

      # Verify TMAS CLI
      - name: Verify TMAS CLI
        run: |
          which tmas
          tmas version

      # Run TMAS Scan
      - name: Run TMAS Scan
        env:
          TMAS_API_KEY: ${{ secrets.TMAS_API_KEY }}
        run: |
          tmas scan \
            docker:vuln-image:latest \
            -V \
            -M \
            -S \
            -r ${{ secrets.TMAS_REGION }} \
            --redacted

      # Upload Report
      - name: Upload TMAS Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tmas-report
          path: |
            *.json
            *.md
