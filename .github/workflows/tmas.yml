name: TMAS Scan

on:
  push:
    branches:
      - main
      
jobs:
  tmas-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # Checkout Repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # Install Dependencies
      - name: Install Dependencies
        run: npm install

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t vuln-image:latest .

      # Verify Docker Image
      - name: Verify Docker Image
        run: |
          docker images
          docker inspect vuln-image:latest

      # Download TMAS CLI
      - name: Download TMAS CLI
        run: |
          curl -L https://ast-cli.xdr.trendmicro.com/tmas-cli/2.263.0/tmas-cli_Linux_x86_64.tar.gz -o tmas.tar.gz
          mkdir tmas-cli
          tar -xzf tmas.tar.gz -C tmas-cli
          chmod +x tmas-cli/tmas
          sudo mv tmas-cli/tmas /usr/local/bin/tmas

      # Verify TMAS CLI
      - name: Verify TMAS CLI
        run: |
          which tmas
          tmas version

      # Run TMAS Scan
      - name: Run TMAS Scan
        env:
          TMAS_API_KEY: ${{ secrets.TMAS_API_KEY }}
        run: |
          tmas scan \
            -V \
            -M \
            -S \
            docker:vuln-image:latest \
            --region ${{ secrets.TMAS_REGION }} \
            --redacted

      # Upload report if generated
      - name: Upload TMAS Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tmas-report
          path: |
            *.md
            *.json
