name: OWASP ZAP Production DAST

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap-dast:

    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TARGET_URL: ${{ secrets.TARGET_URL }}
      DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
      DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}

    steps:

    ###########################################################
    # Checkout
    ###########################################################

    - name: Checkout Repository
      uses: actions/checkout@v4

    ###########################################################
    # Verify Target
    ###########################################################

    - name: Verify Target URL
      run: |
        echo "Checking application availability..."
        curl \
          --retry 5 \
          --retry-delay 5 \
          --retry-all-errors \
          --fail \
          -I "$TARGET_URL"

    ###########################################################
    # Prepare Reports
    ###########################################################

    - name: Create Report Directory
      run: |
        mkdir -p reports

    ###########################################################
    # Pull ZAP Image
    ###########################################################

    - name: Pull ZAP Docker Image
      run: |
        docker pull ghcr.io/zaproxy/zaproxy:2.16.1

    - name: Debug Workspace Permissions
      run: |
       echo "Workspace:"
       pwd
       ls -ld .
       mkdir -p reports
       ls -ld reports
       id


    - name: Test Docker Write Access
      run: |
       docker run --rm \
       -v "${{ github.workspace }}/reports:/zap/wrk:rw" \
       ghcr.io/zaproxy/zaproxy:2.16.1 \
       sh -c "id && touch /zap/wrk/test.txt && ls -l /zap/wrk"

    ###########################################################
    # Run Baseline Scan
    ###########################################################

      

    - name: Run OWASP ZAP Baseline Scan
      run: |

        docker run --rm \
          -v "${{ github.workspace }}/reports:/zap/wrk/:rw" \
          ghcr.io/zaproxy/zaproxy:2.16.1 \
          zap-baseline.py \
          -t "$TARGET_URL" \
          -m 10 \
          -r zap-report.html \
          -J zap-report.json \
          -x zap-report.xml

    ###########################################################
    # Verify Reports
    ###########################################################

    - name: Verify Reports
      run: |
       echo "===== Reports Directory ====="
       ls -lah reports

       test -f reports/zap-report.json
       test -f reports/zap-report.xml
       test -f reports/zap-report.html

    ###########################################################
    # Install jq
    ###########################################################

    - name: Install jq
      run: |
        sudo apt-get update
        sudo apt-get install -y jq

    ###########################################################
    # Count Findings
    ###########################################################

    - name: Analyze Results
      id: analysis
      run: |

        HIGH=$(jq '[.site[].alerts[] | select(.riskcode=="3")] | length' reports/zap-report.json)

        MEDIUM=$(jq '[.site[].alerts[] | select(.riskcode=="2")] | length' reports/zap-report.json)

        LOW=$(jq '[.site[].alerts[] | select(.riskcode=="1")] | length' reports/zap-report.json)

        INFO=$(jq '[.site[].alerts[] | select(.riskcode=="0")] | length' reports/zap-report.json)

        echo "HIGH=$HIGH" >> $GITHUB_ENV
        echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
        echo "LOW=$LOW" >> $GITHUB_ENV
        echo "INFO=$INFO" >> $GITHUB_ENV

        echo "High: $HIGH"
        echo "Medium: $MEDIUM"
        echo "Low: $LOW"
        echo "Info: $INFO"

    ###########################################################
    # Show Findings
    ###########################################################

    - name: Show Findings
      if: success()
      run: |

        jq -r '
        .site[].alerts[] |
        "---------------------------------\n" +
        "Alert       : \(.alert)\n" +
        "Risk        : \(.riskdesc)\n" +
        "Confidence  : \(.confidence)\n" +
        "Description : \(.desc)\n"
        ' reports/zap-report.json

    ###########################################################
    # Upload Reports
    ###########################################################

    - name: Upload Reports
      if: always()
      uses: actions/upload-artifact@v4

      with:
        name: zap-reports
        path: reports/
        retention-days: 30

    ###########################################################
    # Import into DefectDojo
    ###########################################################

    - name: Upload Report to DefectDojo
      if: success()

      run: |

        curl \
          --retry 3 \
          --retry-delay 5 \
          --retry-all-errors \
          --fail \
          -X POST \
          "$DEFECTDOJO_URL/api/v2/import-scan/" \
          -H "Authorization: Token $DEFECTDOJO_API_KEY" \
          -F scan_type="ZAP Scan" \
          -F file=@reports/zap-report.xml \
          -F product_name="SAST-POC" \
          -F engagement_name="GitHub Actions" \
          -F product_type_name="Web Application" \
          -F active=true \
          -F verified=true \
          -F minimum_severity=Info \
          -F close_old_findings=true \
          -F auto_create_context=true \
          -F scan_date=$(date +%F)

    ###########################################################
    # GitHub Summary
    ###########################################################

    - name: Workflow Summary
      if: success()
      run: |

        {
          echo "# OWASP ZAP Scan Summary"
          echo ""
          echo "| Severity | Count |"
          echo "|----------|------:|"
          echo "| High | $HIGH |"
          echo "| Medium | $MEDIUM |"
          echo "| Low | $LOW |"
          echo "| Info | $INFO |"
          echo ""
          echo "Target: $TARGET_URL"
        } >> $GITHUB_STEP_SUMMARY

    ###########################################################
    # Quality Gate
    ###########################################################

    - name: Fail if High Vulnerabilities Exist
      run: |

        if [ "$HIGH" -gt 0 ]; then
          echo "High vulnerabilities detected."
          exit 1
        fi

        echo "No High vulnerabilities detected."
